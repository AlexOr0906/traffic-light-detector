<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Light Detector</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2b2b;
    --yellow: #ffd600;
    --green: #00e676;
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222;
    --text: #f0f0f0;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 60px;
  }

  .traffic-icon {
    display: flex;
    flex-direction: column;
    gap: 5px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }
  .dot.r { background: var(--red); box-shadow: 0 0 10px var(--red); animation: pulse 2s infinite; }
  .dot.y { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); animation: pulse 2s 0.6s infinite; }
  .dot.g { background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s 1.2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(90deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .title-block p {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Upload zone */
  .upload-zone {
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px dashed transparent;
    min-height: 300px;
    text-align: center;
  }

  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--green);
    background: rgba(0,230,118,0.03);
  }

  .upload-icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.2s;
  }

  .upload-zone:hover .upload-icon {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(0,230,118,0.2);
  }

  .upload-zone h3 {
    font-size: 14px;
    font-weight: 700;
  }

  .upload-zone p {
    font-size: 11px;
    color: var(--muted);
  }

  #fileInput { display: none; }

  .btn {
    background: var(--green);
    color: #000;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: #00ff85; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,230,118,0.3); }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* Preview */
  .preview-wrap {
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .preview-wrap img {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Result panel */
  .result-panel {
    min-height: 300px;
    display: flex;
    flex-direction: column;
  }

  .result-content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }

  .detection-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #161616;
    border-radius: 10px;
    border: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .det-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .det-info { flex: 1; }
  .det-class { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  .det-conf { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .conf-bar-wrap {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .conf-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .result-img-wrap {
    padding: 20px;
    display: none;
  }

  .result-img-wrap img {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Loading */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    flex: 1;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

  /* Summary bar */
  .summary {
    display: none;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .summary span { color: var(--green); font-weight: 700; }

  .none-found {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="traffic-icon">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
    <div class="title-block">
      <h1>Traffic Detector</h1>
      <p>YOLOv8 Neural Network · Real-time detection</p>
    </div>
  </header>

  <div class="main-grid">
    <!-- Upload panel -->
    <div class="panel">
      <div class="panel-header">// input image</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📷</div>
        <h3>Загрузи фото</h3>
        <p>Перетащи сюда или нажми кнопку</p>
        <button class="btn" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="preview">
        <div style="display:flex; gap:10px;">
          <button class="btn" id="detectBtn" onclick="detect()" style="flex:1">🔍 Определить</button>
          <button class="btn" onclick="resetUpload()" style="background:#1a1a1a; color:#888; border:1px solid #333; flex-shrink:0;">↩ Другое фото</button>
        </div>
      </div>
    </div>

    <!-- Result panel -->
    <div class="panel result-panel">
      <div class="panel-header">// detection results</div>
      <div class="result-content" id="resultContent">
        <div class="placeholder" id="placeholder">
          <span style="font-size:32px">🚦</span>
          <span>Загрузи фото для анализа</span>
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Анализирую изображение...</p>
        </div>
        <div id="detectionsList"></div>
      </div>
      <div class="result-img-wrap" id="resultImgWrap">
        <img id="resultImg" src="" alt="result">
      </div>
      <div class="summary" id="summary">
        Найдено светофоров: <span id="countSpan">0</span>
      </div>
    </div>
  </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const placeholder = document.getElementById('placeholder');
const loading = document.getElementById('loading');
const detectionsList = document.getElementById('detectionsList');
const resultImgWrap = document.getElementById('resultImgWrap');
const resultImg = document.getElementById('resultImg');
const summary = document.getElementById('summary');
const countSpan = document.getElementById('countSpan');

const CLASS_COLORS = {
  red: '#ff2b2b',
  green: '#00e676',
  yellow: '#ffd600',
  off: '#888888'
};

const CLASS_LABELS = {
  red: '🔴 Красный',
  green: '🟢 Зелёный',
  yellow: '🟡 Жёлтый',
  off: '⚫ Выключен'
};

// Drag & drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    uploadZone.style.display = 'none';
    previewWrap.style.display = 'flex';
    // Reset results
    placeholder.style.display = 'flex';
    loading.style.display = 'none';
    detectionsList.innerHTML = '';
    resultImgWrap.style.display = 'none';
    summary.style.display = 'none';
  };
  reader.readAsDataURL(file);
  window._currentFile = file;
}

function resetUpload() {
  window._currentFile = null;
  fileInput.value = '';
  previewImg.src = '';
  previewWrap.style.display = 'none';
  uploadZone.style.display = 'flex';
  placeholder.style.display = 'flex';
  loading.style.display = 'none';
  detectionsList.innerHTML = '';
  resultImgWrap.style.display = 'none';
  summary.style.display = 'none';
}

async function detect() {
  if (!window._currentFile) return;

  placeholder.style.display = 'none';
  loading.style.display = 'flex';
  detectionsList.innerHTML = '';
  resultImgWrap.style.display = 'none';
  summary.style.display = 'none';

  const formData = new FormData();
  formData.append('image', window._currentFile);

  try {
    const res = await fetch('http://localhost:5000/detect', { method: 'POST', body: formData });
    const data = await res.json();

    loading.style.display = 'none';

    // Show annotated image
    resultImg.src = 'data:image/jpeg;base64,' + data.image;
    resultImgWrap.style.display = 'block';

    if (data.detections.length === 0) {
      detectionsList.innerHTML = '<div class="none-found">Светофоры не найдены</div>';
    } else {
      data.detections.forEach(det => {
        const color = CLASS_COLORS[det.class] || '#fff';
        const label = CLASS_LABELS[det.class] || det.class;
        const confPct = Math.round(det.confidence * 100);

        detectionsList.innerHTML += `
          <div class="detection-item">
            <div class="det-dot" style="background:${color}; box-shadow: 0 0 8px ${color}"></div>
            <div class="det-info">
              <div class="det-class" style="color:${color}">${label}</div>
              <div class="det-conf">Уверенность: ${confPct}%</div>
            </div>
            <div>
              <div class="conf-bar-wrap">
                <div class="conf-bar" style="width:${confPct}%; background:${color}"></div>
              </div>
            </div>
          </div>`;
      });

      countSpan.textContent = data.detections.length;
      summary.style.display = 'block';
    }
  } catch (err) {
    loading.style.display = 'none';
    detectionsList.innerHTML = '<div class="none-found">⚠️ Сервер не отвечает.<br>Запусти server.py</div>';
  }
}
</script>
</body>
</html>
